<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plant Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f6fa;
}

.wrap {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

canvas { max-width: 100%; }

#status {
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Plant Dashboard</h1>
  <p id="status">Loading data...</p>
  <canvas id="chart"></canvas>
</div>

<script>
let rawData = [];

/* 🔥 REEMPLAZA ESTO */
const DATA_URL = "PEGA_AQUI_TU_URL_APPS_SCRIPT";

async function loadData() {
  try {
    const res = await fetch(DATA_URL);

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    rawData = JSON.parse(text);

    if (!Array.isArray(rawData)) {
      throw new Error("Data is not an array");
    }

    document.getElementById("status").innerText =
      `Loaded: ${rawData.length} records`;

    renderChart();

  } catch (e) {
    console.error("LOAD ERROR:", e);
    document.getElementById("status").innerText =
      "Error loading data (check console + URL)";
  }
}

function renderChart() {
  const ctx = document.getElementById("chart");

  const grouped = { C: 0, TT: 0, MIX: 0, IELF: 0 };

  rawData.forEach(d => {
    // 🔥 robusto contra schemas diferentes
    const t = d.t || d.Treatment || d.treatment;

    if (grouped[t] !== undefined) {
      grouped[t]++;
    }
  });

  console.log("GROUPED:", grouped);

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: "Pots",
        data: Object.values(grouped),
        backgroundColor: ["#3a7d44","#4a6fa5","#d4a03c","#c44536"]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      }
    }
  });
}

loadData();
</script>

</body>
</html>
