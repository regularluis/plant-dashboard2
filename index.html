<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f6fa;
}

.wrap {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
canvas { max-width: 100%; }
</style>
</head>

<body>

<div class="wrap">
  <h1>Plant Dashboard</h1>
  <p id="status">Loading data...</p>

  <canvas id="chart"></canvas>
</div>

<script>
let rawData = [];

/* 🔥 IMPORTANTE: SOLO AQUÍ pones tu Apps Script URL */
const DATA_URL = "PEGA_AQUI_TU_URL_APPS_SCRIPT";

async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    rawData = await res.json();

    document.getElementById("status").innerText =
      "Loaded: " + rawData.length + " records";

    renderChart();

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "Error loading data (check URL)";
  }
}

function renderChart() {
  const ctx = document.getElementById("chart");

  const grouped = {
    C: 0, TT: 0, MIX: 0, IELF: 0
  };

  rawData.forEach(d => {
    if (grouped[d.t] !== undefined) grouped[d.t]++;
  });

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: "Pots",
        data: Object.values(grouped)
      }]
    }
  });
}

loadData();
</script>

</body>
</html>
