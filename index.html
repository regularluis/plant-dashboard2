<style>

<body>

<div class="wrap">
  <h1>Plant Germination & Survival Analysis</h1>

  <!-- ===== TU HTML COMPLETO SIN CAMBIOS ===== -->
  <!-- (NO LO REPITO ENTERO PARA NO HACERTE SCROLL INNECESARIO) -->

</div>

<script>
/* =======================
   1. GLOBAL STATE
======================= */
let rawData = [];

/* =======================
   2. LOAD DATA (CORREGIDO)
======================= */
async function loadData() {
  try {
    const res = await fetch("PEGA_AQUI_TU_URL_APPS_SCRIPT");

    if (!res.ok) throw new Error("HTTP error " + res.status);

    rawData = await res.json();

    console.log("DATA LOADED:", rawData.length);

    // inicialización segura
    initRaw?.();
    initSpecies?.();
    initPerf?.();
    switchTab(0);

  } catch (e) {
    console.error("ERROR FETCH:", e);
  }
}

/* =======================
   3. INIT ONCE DOM IS READY
======================= */
document.addEventListener("DOMContentLoaded", () => {
  loadData();
});

/* =======================
   4. TABS
======================= */
function switchTab(i) {
  document.querySelectorAll('.tab')
    .forEach((t, idx) => t.classList.toggle('active', idx === i));

  document.querySelectorAll('.panel')
    .forEach((p, idx) => p.classList.toggle('active', idx === i));

  if (i === 1 && !window._survInit) initSurv();
  if (i === 2 && !window._perfInit) initPerf();
  if (i === 3 && !window._specInit) initSpecies();
  if (i === 4 && !window._rawInit) initRaw();
}

/* =======================
   5. CHART PLACEHOLDER (EJEMPLO LIMPIO)
======================= */
function initSurv() {
  window._survInit = true;

  new Chart(document.getElementById('chart-surv'), {
    type: 'bar',
    data: {
      labels: ['Control','TT','MIX','IELF'],
      datasets: [
        { label: 'Survived', data: [27,7,2,0], backgroundColor: '#3a7d44' },
        { label: 'Died', data: [0,9,4,2], backgroundColor: '#c44536' }
      ]
    },
    options: {
      responsive: true,
      scales: { x: { stacked: true }, y: { stacked: true } }
    }
  });
}

/* =======================
   6. PERFORMANCE (SIN CAMBIOS LOGICOS)
======================= */
let perfChart = null;
let scatterChart = null;
let currentPerf = 'length';

function initPerf() {
  window._perfInit = true;
  renderPerf();
}

function renderPerf() {
  // TU LOGICA TAL CUAL (NO LA TOCO AQUÍ PARA NO ROMPER ESTADÍSTICA)
}

/* =======================
   7. SPECIES
======================= */
function initSpecies() {
  window._specInit = true;

  const tbody = document.getElementById('heatmap-body');
  tbody.innerHTML = ""; // IMPORTANTE: evita duplicados si recargas

  // tu lógica aquí...
}

/* =======================
   8. RAW TABLE
======================= */
function initRaw() {
  window._rawInit = true;
  renderRaw();
}

function renderRaw() {
  if (!rawData.length) return;

  const tbody = document.querySelector('#raw-table tbody');
  tbody.innerHTML = rawData.map(d => `
    <tr>
      <td>${d.id}</td>
      <td>${d.t}</td>
      <td>${d.sp}</td>
      <td>${d.cnt}</td>
      <td>${(d.gr*100).toFixed(1)}%</td>
      <td>${d.len ?? '—'}</td>
      <td>${d.fw ?? '—'}</td>
      <td>${d.dw ?? '—'}</td>
      <td>${d.st}</td>
    </tr>
  `).join('');
}

/* =======================
   9. SORT (BÁSICO)
======================= */
window.sortRaw = function(key) {
  rawData.sort((a,b) => (a[key] > b[key] ? 1 : -1));
  renderRaw();
};

</script>

</body>
</html>
